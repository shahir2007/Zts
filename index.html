<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Z.T.S</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --cyan: #00d4ff;
    --cyan-dim: rgba(0,212,255,0.15);
    --cyan-glow: rgba(0,212,255,0.4);
    --gold: #ffc844;
    --red: #ff4444;
    --bg: #030810;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    font-family: 'Share Tech Mono', monospace;
    color: var(--cyan);
    min-height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,3,12,0.85) 100%);
    pointer-events: none;
    z-index: 0;
  }
  .header { position:fixed; top:0; left:0; right:0; padding:12px 20px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid rgba(0,212,255,0.18); background:rgba(3,8,16,0.95); backdrop-filter:blur(8px); z-index:100; }
  .logo { font-family:'Orbitron',monospace; font-weight:900; font-size:18px; letter-spacing:6px; color:var(--cyan); text-shadow:0 0 20px var(--cyan-glow); }
  .logo span { color: var(--gold); }
  .status-bar { display:flex; gap:14px; font-size:10px; color:rgba(0,212,255,0.6); }
  .status-item { display:flex; align-items:center; gap:5px; }
  .dot { width:6px; height:6px; border-radius:50%; background:#00ff88; box-shadow:0 0 6px #00ff88; animation:pulse 2s ease-in-out infinite; }
  .dot.red { background:var(--red); box-shadow:0 0 6px var(--red); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .main { position:relative; z-index:10; width:100%; max-width:720px; padding:0 16px; display:flex; flex-direction:column; align-items:center; height:100vh; padding-top:64px; }
  .arc-container { position:relative; width:150px; height:150px; margin:10px 0 6px; flex-shrink:0; }
  .arc-svg { width:100%; height:100%; animation:arc-rotate 8s linear infinite; filter:drop-shadow(0 0 10px var(--cyan)); }
  @keyframes arc-rotate { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
  .arc-inner { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; }
  .core { width:55px; height:55px; border-radius:50%; background:radial-gradient(circle,rgba(0,212,255,0.8) 0%,rgba(0,80,150,0.4) 50%,transparent 70%); box-shadow:0 0 20px var(--cyan),0 0 50px rgba(0,212,255,0.4),inset 0 0 15px rgba(0,212,255,0.3); animation:core-pulse 3s ease-in-out infinite; display:flex; align-items:center; justify-content:center; }
  @keyframes core-pulse {
    0%,100%{box-shadow:0 0 20px var(--cyan),0 0 50px rgba(0,212,255,0.4),inset 0 0 15px rgba(0,212,255,0.3)}
    50%{box-shadow:0 0 35px var(--cyan),0 0 80px rgba(0,212,255,0.6),inset 0 0 25px rgba(0,212,255,0.5)}
  }
  .core-symbol { font-family:'Orbitron',monospace; font-size:17px; font-weight:900; color:white; text-shadow:0 0 10px var(--cyan); }
  .waveform { display:flex; align-items:center; gap:3px; height:28px; margin-bottom:6px; }
  .wave-bar { width:3px; background:var(--cyan); border-radius:2px; box-shadow:0 0 4px var(--cyan); transform-origin:bottom; height:3px; }
  .waveform.active .wave-bar { animation:wave 0.8s ease-in-out infinite alternate; }
  @keyframes wave { from{transform:scaleY(0.2)} to{transform:scaleY(1)} }
  .chat-window { width:100%; flex:1; overflow-y:auto; padding:8px 0; display:flex; flex-direction:column; gap:10px; scrollbar-width:thin; scrollbar-color:rgba(0,212,255,0.3) transparent; }
  .message { display:flex; gap:10px; animation:msg-in 0.3s ease-out; }
  @keyframes msg-in { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .message.user { flex-direction:row-reverse; }
  .msg-icon { width:28px; height:28px; border-radius:50%; border:1px solid var(--cyan); display:flex; align-items:center; justify-content:center; font-size:10px; flex-shrink:0; font-family:'Orbitron',monospace; color:var(--cyan); }
  .message.user .msg-icon { border-color:var(--gold); color:var(--gold); }
  .bubble { max-width:82%; padding:9px 13px; border-radius:2px; font-size:12px; line-height:1.7; }
  .message.jarvis .bubble { background:rgba(0,212,255,0.06); border:1px solid rgba(0,212,255,0.25); border-left:3px solid var(--cyan); color:#c8eeff; }
  .message.user .bubble { background:rgba(255,200,68,0.06); border:1px solid rgba(255,200,68,0.25); border-right:3px solid var(--gold); color:#ffe8a0; text-align:right; }
  .label { font-size:8px; letter-spacing:2px; opacity:0.5; margin-bottom:3px; font-family:'Orbitron',monospace; }
  .chat-img { max-width:180px; max-height:140px; border:1px solid rgba(0,212,255,0.3); margin-top:5px; border-radius:2px; display:block; }
  .typing-indicator { display:none; gap:5px; padding:9px 13px; background:rgba(0,212,255,0.06); border:1px solid rgba(0,212,255,0.2); border-left:3px solid var(--cyan); }
  .typing-indicator.visible { display:flex; align-items:center; }
  .typing-dot { width:6px; height:6px; border-radius:50%; background:var(--cyan); animation:typing 1.2s ease-in-out infinite; }
  .typing-dot:nth-child(2){animation-delay:0.2s} .typing-dot:nth-child(3){animation-delay:0.4s}
  @keyframes typing { 0%,100%{opacity:0.2;transform:translateY(0)} 50%{opacity:1;transform:translateY(-4px)} }
  .input-area { width:100%; padding:8px 0 12px; border-top:1px solid rgba(0,212,255,0.15); }
  .toolbar { display:flex; gap:5px; margin-bottom:7px; flex-wrap:wrap; }
  .tool-btn { background:transparent; border:1px solid rgba(0,212,255,0.25); color:rgba(0,212,255,0.7); font-family:'Share Tech Mono',monospace; font-size:9px; letter-spacing:1px; padding:5px 9px; cursor:pointer; transition:all 0.2s; display:flex; align-items:center; gap:3px; }
  .tool-btn:hover { background:var(--cyan-dim); border-color:var(--cyan); color:var(--cyan); box-shadow:0 0 8px var(--cyan-glow); }
  .tool-btn.active { background:rgba(0,212,255,0.12); border-color:var(--cyan); color:var(--cyan); }
  .input-row { display:flex; gap:7px; align-items:center; }
  .input-wrap { flex:1; position:relative; }
  .corner { position:absolute; width:7px; height:7px; border-color:var(--cyan); border-style:solid; opacity:0.6; }
  .corner.tl{top:0;left:0;border-width:1px 0 0 1px} .corner.tr{top:0;right:0;border-width:1px 1px 0 0}
  .corner.bl{bottom:0;left:0;border-width:0 0 1px 1px} .corner.br{bottom:0;right:0;border-width:0 1px 1px 0}
  input[type="text"] { width:100%; background:rgba(0,212,255,0.04); border:1px solid rgba(0,212,255,0.2); color:var(--cyan); font-family:'Share Tech Mono',monospace; font-size:13px; padding:10px 13px; outline:none; transition:border-color 0.2s; }
  input[type="text"]::placeholder { color:rgba(0,212,255,0.3); }
  input[type="text"]:focus { border-color:rgba(0,212,255,0.6); box-shadow:0 0 10px rgba(0,212,255,0.1); }
  .send-btn { background:transparent; border:1px solid var(--cyan); color:var(--cyan); font-family:'Orbitron',monospace; font-size:9px; letter-spacing:2px; padding:10px 14px; cursor:pointer; transition:all 0.2s; white-space:nowrap; }
  .send-btn:hover { background:var(--cyan-dim); box-shadow:0 0 12px var(--cyan-glow); }
  .send-btn:disabled { opacity:0.4; cursor:not-allowed; }
  .mic-btn { background:transparent; border:1px solid var(--cyan); color:var(--cyan); font-size:15px; padding:8px 11px; cursor:pointer; transition:all 0.2s; flex-shrink:0; }
  .mic-btn:hover { background:var(--cyan-dim); }
  .mic-btn.listening { border-color:#ff4444; box-shadow:0 0 15px rgba(255,50,50,0.5); animation:mic-pulse 1s ease-in-out infinite; }
  @keyframes mic-pulse { 0%,100%{box-shadow:0 0 8px rgba(255,50,50,0.4)} 50%{box-shadow:0 0 22px rgba(255,50,50,0.8)} }
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.88); z-index:200; align-items:center; justify-content:center; }
  .modal-overlay.open { display:flex; }
  .modal { background:#030d1a; border:1px solid rgba(0,212,255,0.3); padding:16px; width:92%; max-width:400px; }
  .modal-title { font-family:'Orbitron',monospace; font-size:11px; letter-spacing:3px; color:var(--cyan); margin-bottom:12px; }
  #camera-feed { width:100%; border:1px solid rgba(0,212,255,0.2); background:#000; }
  .modal-btns { display:flex; gap:8px; margin-top:10px; }
  .modal-btn { flex:1; background:transparent; border:1px solid var(--cyan); color:var(--cyan); font-family:'Share Tech Mono',monospace; font-size:11px; padding:8px; cursor:pointer; transition:all 0.2s; }
  .modal-btn:hover { background:var(--cyan-dim); }
  .modal-btn.danger { border-color:#ff4444; color:#ff4444; }
  .modal-btn.danger:hover { background:rgba(255,50,50,0.1); }
  .project-panel { display:none; position:fixed; top:52px; right:0; bottom:0; width:250px; background:rgba(3,8,20,0.97); border-left:1px solid rgba(0,212,255,0.2); z-index:90; padding:14px; overflow-y:auto; }
  .project-panel.open { display:block; }
  .project-title { font-family:'Orbitron',monospace; font-size:10px; letter-spacing:3px; color:var(--cyan); margin-bottom:12px; border-bottom:1px solid rgba(0,212,255,0.15); padding-bottom:8px; }
  .project-item { background:rgba(0,212,255,0.04); border:1px solid rgba(0,212,255,0.15); padding:8px 10px; margin-bottom:6px; font-size:11px; cursor:pointer; transition:all 0.2s; }
  .project-item:hover { border-color:var(--cyan); }
  .project-item .p-name { color:var(--cyan); }
  .project-item .p-date { color:rgba(0,212,255,0.4); font-size:9px; margin-top:2px; }
  .project-add-btn { width:100%; background:transparent; border:1px dashed rgba(0,212,255,0.3); color:rgba(0,212,255,0.5); font-family:'Share Tech Mono',monospace; font-size:10px; padding:8px; cursor:pointer; transition:all 0.2s; margin-top:6px; }
  .project-add-btn:hover { border-color:var(--cyan); color:var(--cyan); }
  #canvas-hidden { display:none; }
</style>
</head>
<body>
<input type="file" id="file-input" style="display:none" accept="*/*" onchange="handleFile(event)">
<input type="file" id="photo-input" style="display:none" accept="image/*" capture="environment" onchange="handlePhoto(event)">
<canvas id="canvas-hidden"></canvas>

<div class="modal-overlay" id="camera-modal">
  <div class="modal">
    <div class="modal-title">📷 CAMERA FEED</div>
    <video id="camera-feed" autoplay playsinline></video>
    <div class="modal-btns">
      <button class="modal-btn" onclick="capturePhoto()">📸 CAPTURE</button>
      <button class="modal-btn danger" onclick="closeCamera()">✕ CLOSE</button>
    </div>
  </div>
</div>

<div class="project-panel" id="project-panel">
  <div class="project-title">📁 MY PROJECTS</div>
  <div id="project-list"></div>
  <button class="project-add-btn" onclick="addCurrentToProject()">+ SAVE CURRENT CHAT</button>
</div>

<header class="header">
  <div class="logo">Z<span>.</span>T<span>.</span>S</div>
  <div class="status-bar">
    <div class="status-item"><div class="dot"></div> ONLINE</div>
    <div class="status-item"><div class="dot red" id="net-dot"></div><span id="net-status">NET</span></div>
    <div class="status-item" id="clock">00:00:00</div>
  </div>
</header>

<div class="main">
  <div class="arc-container">
    <svg class="arc-svg" viewBox="0 0 240 240">
      <circle cx="120" cy="120" r="110" fill="none" stroke="rgba(0,212,255,0.15)" stroke-width="1"/>
      <circle cx="120" cy="120" r="100" fill="none" stroke="rgba(0,212,255,0.3)" stroke-width="1" stroke-dasharray="8 6"/>
      <path d="M120,20 A100,100 0 0,1 220,120" fill="none" stroke="#00d4ff" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M220,120 A100,100 0 0,1 120,220" fill="none" stroke="rgba(0,212,255,0.3)" stroke-width="1"/>
      <path d="M120,220 A100,100 0 0,1 20,120" fill="none" stroke="#00d4ff" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M20,120 A100,100 0 0,1 120,20" fill="none" stroke="rgba(0,212,255,0.3)" stroke-width="1"/>
      <g stroke="rgba(0,212,255,0.5)" stroke-width="1">
        <line x1="120" y1="10" x2="120" y2="22"/>
        <line x1="230" y1="120" x2="218" y2="120"/>
        <line x1="120" y1="230" x2="120" y2="218"/>
        <line x1="10" y1="120" x2="22" y2="120"/>
      </g>
      <circle cx="120" cy="120" r="50" fill="none" stroke="rgba(0,212,255,0.12)" stroke-width="1"/>
      <circle cx="120" cy="120" r="40" fill="none" stroke="rgba(0,212,255,0.08)" stroke-width="1" stroke-dasharray="4 4"/>
    </svg>
    <div class="arc-inner">
      <div class="core"><div class="core-symbol">Z</div></div>
    </div>
  </div>

  <div class="waveform" id="waveform">
    <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
    <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
    <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
    <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
  </div>

  <div class="chat-window" id="chat">
    <div class="message jarvis">
      <div class="msg-icon">Z</div>
      <div class="bubble">
        <div class="label">ZTS</div>
        All systems online. I am ready to assist you, sir. You may speak, type, share a file, take a photo, or activate web search.
      </div>
    </div>
  </div>

  <div class="message jarvis" id="typing-row" style="display:none;padding-bottom:4px;">
    <div class="msg-icon">Z</div>
    <div class="typing-indicator visible">
      <div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>
    </div>
  </div>

  <div class="input-area">
    <div class="toolbar">
      <button class="tool-btn" onclick="document.getElementById('file-input').click()">📎 FILE</button>
      <button class="tool-btn" onclick="openCamera()">📷 CAMERA</button>
      <button class="tool-btn" onclick="document.getElementById('photo-input').click()">🖼 PHOTO</button>
      <button class="tool-btn" id="search-btn" onclick="toggleSearch()">🔍 WEB</button>
      <button class="tool-btn" onclick="toggleProjectPanel()">📁 PROJECT</button>
    </div>
    <div class="input-row">
      <div class="input-wrap">
        <div class="corner tl"></div><div class="corner tr"></div>
        <div class="corner bl"></div><div class="corner br"></div>
        <input type="text" id="user-input" placeholder="ENTER COMMAND..." autocomplete="off"/>
      </div>
      <button class="mic-btn" id="mic-btn" onclick="toggleMic()">🎤</button>
      <button class="send-btn" id="send-btn" onclick="sendMessage()">SEND ▶</button>
    </div>
  </div>
</div>

<script>
  function updateClock(){
    const n=new Date();
    document.getElementById('clock').textContent=
      String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0')+':'+String(n.getSeconds()).padStart(2,'0');
  }
  setInterval(updateClock,1000); updateClock();

  const waveform=document.getElementById('waveform');
  function setWaveActive(on){
    waveform.className='waveform'+(on?' active':'');
    const bars=waveform.querySelectorAll('.wave-bar');
    const h=[18,30,24,36,20,34,22,32,26,38,20,28];
    bars.forEach((b,i)=>{
      b.style.height=on?h[i]+'px':'3px';
      if(on){b.style.animationDelay=(i*0.07)+'s';b.style.animationDuration=(0.6+Math.random()*0.4)+'s';}
    });
  }

  const chat=document.getElementById('chat');
  const typingRow=document.getElementById('typing-row');
  const sendBtn=document.getElementById('send-btn');
  const inputEl=document.getElementById('user-input');
  const history=[];
  let pendingImageB64=null,pendingImageMime=null,webSearchMode=false;

  const SYS=`You are Z.T.S, an advanced AI assistant. Sophisticated, helpful, slightly formal with occasional dry wit. Address the user as "sir" or "ma'am". Keep responses concise 1-4 sentences. No markdown or asterisks. Plain text only.`;

  const API_KEY='AIzaSyD3jZFraPYd5IV87rEuuIlOfBqx1nCwuag';

  async function sendMessage(){
    const text=inputEl.value.trim();
    if((!text&&!pendingImageB64)||sendBtn.disabled)return;
    inputEl.value=''; sendBtn.disabled=true;
    let userContent;
    if(pendingImageB64){
      userContent=[
        {type:'image',source:{type:'base64',media_type:pendingImageMime,data:pendingImageB64}},
        {type:'text',text:text||'Describe this image.'}
      ];
      appendMsgImg('user',text||'Describe this image.',pendingImageB64,pendingImageMime);
      pendingImageB64=null; pendingImageMime=null;
    } else {
      userContent=text; appendMsg('user',text);
    }
    history.push({role:'user',content:userContent});
    typingRow.style.display='flex';
    chat.scrollTop=chat.scrollHeight;
    setWaveActive(true);
    try {
      const body={model:'claude-sonnet-4-20250514',max_tokens:1000,system:SYS,messages:history};
      if(webSearchMode)body.tools=[{type:'web_search_20250305',name:'web_search'}];
      const res=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json','x-api-key':API_KEY,'anthropic-version':'2023-06-01'},
        body:JSON.stringify(body)
      });
      const data=await res.json();
      const reply=data.content?.filter(c=>c.type==='text').map(c=>c.text).join('')||'Systems error, sir.';
      document.getElementById('net-dot').className='dot';
      document.getElementById('net-status').textContent='LIVE';
      history.push({role:'assistant',content:reply});
      typingRow.style.display='none'; setWaveActive(false);
      appendMsg('jarvis',webSearchMode?'🔍 '+reply:reply);
      speak(reply);
    } catch(e){
      typingRow.style.display='none'; setWaveActive(false);
      appendMsg('jarvis','Connection anomaly detected. Please verify API access and try again, sir.');
    }
    sendBtn.disabled=false; inputEl.focus();
  }

  function appendMsg(role,text){
    const d=document.createElement('div'); d.className='message '+role;
    d.innerHTML=`<div class="msg-icon">${role==='jarvis'?'Z':'U'}</div>
      <div class="bubble"><div class="label">${role==='jarvis'?'ZTS':'USER'}</div>${esc(text)}</div>`;
    chat.appendChild(d); chat.scrollTop=chat.scrollHeight;
  }
  function appendMsgImg(role,text,b64,mime){
    const d=document.createElement('div'); d.className='message '+role;
    d.innerHTML=`<div class="msg-icon">${role==='jarvis'?'Z':'U'}</div>
      <div class="bubble"><div class="label">${role==='jarvis'?'ZTS':'USER'}</div>
      <img class="chat-img" src="data:${mime};base64,${b64}"><br>${esc(text)}</div>`;
    chat.appendChild(d); chat.scrollTop=chat.scrollHeight;
  }
  function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

  function toggleSearch(){
    webSearchMode=!webSearchMode;
    const btn=document.getElementById('search-btn');
    btn.classList.toggle('active',webSearchMode);
    btn.textContent=webSearchMode?'🔍 WEB ON':'🔍 WEB';
    appendMsg('jarvis',webSearchMode?'Web search activated, sir.':'Web search deactivated.');
  }

  function handleFile(e){
    const file=e.target.files[0]; if(!file)return;
    const reader=new FileReader();
    if(file.type.startsWith('image/')){
      reader.onload=ev=>{pendingImageB64=ev.target.result.split(',')[1];pendingImageMime=file.type;inputEl.value='Analyze this image: '+file.name;appendMsg('jarvis','File received: '+file.name+'. Ready, sir.');};
      reader.readAsDataURL(file);
    } else {
      reader.onload=ev=>{inputEl.value='Analyze this file "'+file.name+'": '+ev.target.result.substring(0,3000);appendMsg('jarvis','File loaded: '+file.name+'. Ready, sir.');};
      reader.readAsText(file);
    }
    e.target.value='';
  }

  function handlePhoto(e){
    const file=e.target.files[0]; if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{pendingImageB64=ev.target.result.split(',')[1];pendingImageMime=file.type;inputEl.value='Describe this image in detail.';appendMsg('jarvis','Photo received. Ready to analyze, sir.');};
    reader.readAsDataURL(file);
    e.target.value='';
  }

  let cameraStream=null;
  async function openCamera(){
    document.getElementById('camera-modal').classList.add('open');
    try {
      cameraStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
      document.getElementById('camera-feed').srcObject=cameraStream;
    } catch(e){
      appendMsg('jarvis','Camera access denied, sir.');
      document.getElementById('camera-modal').classList.remove('open');
    }
  }
  function capturePhoto(){
    const v=document.getElementById('camera-feed');
    const c=document.getElementById('canvas-hidden');
    c.width=v.videoWidth; c.height=v.videoHeight;
    c.getContext('2d').drawImage(v,0,0);
    const d=c.toDataURL('image/jpeg',0.85);
    pendingImageB64=d.split(',')[1]; pendingImageMime='image/jpeg';
    inputEl.value='Describe what you see in this photo.';
    appendMsg('jarvis','Photo captured. Ready to analyze, sir.');
    closeCamera();
  }
  function closeCamera(){
    if(cameraStream){cameraStream.getTracks().forEach(t=>t.stop());cameraStream=null;}
    document.getElementById('camera-modal').classList.remove('open');
  }

  const micBtn=document.getElementById('mic-btn');
  let recognition=null,isListening=false;
  function toggleMic(){
    if(!('webkitSpeechRecognition' in window||'SpeechRecognition' in window)){
      appendMsg('jarvis','Voice input not supported, sir. Please use Chrome.');return;
    }
    if(isListening){recognition.stop();return;}
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    recognition=new SR(); recognition.lang='en-US'; recognition.interimResults=false;
    recognition.onstart=()=>{isListening=true;micBtn.classList.add('listening');micBtn.textContent='🔴';setWaveActive(true);};
    recognition.onresult=e=>{inputEl.value=e.results[0][0].transcript;sendMessage();};
    recognition.onend=()=>{isListening=false;micBtn.classList.remove('listening');micBtn.textContent='🎤';setWaveActive(false);};
    recognition.onerror=()=>{isListening=false;micBtn.classList.remove('listening');micBtn.textContent='🎤';setWaveActive(false);};
    recognition.start();
  }

  function speak(text){
    if(!('speechSynthesis' in window))return;
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.rate=0.95;u.pitch=0.85;u.volume=1;
    const voices=window.speechSynthesis.getVoices();
    const v=voices.find(v=>v.name.includes('Daniel')||v.name.includes('Google UK')||v.name.toLowerCase().includes('male'));
    if(v)u.voice=v;
    window.speechSynthesis.speak(u);
  }
  window.speechSynthesis.onvoiceschanged=()=>{};

  let projects=JSON.parse(localStorage.getItem('zts_projects')||'[]');
  function toggleProjectPanel(){document.getElementById('project-panel').classList.toggle('open');renderProjects();}
  function renderProjects(){
    const list=document.getElementById('project-list'); list.innerHTML='';
    if(!projects.length){list.innerHTML='<div style="color:rgba(0,212,255,0.3);font-size:10px;padding:8px 0;">No saved projects yet.</div>';return;}
    projects.forEach((p,i)=>{
      const d=document.createElement('div'); d.className='project-item';
      d.innerHTML=`<div class="p-name">📁 ${esc(p.name)}</div><div class="p-date">${p.date} · ${p.messages} msgs</div>`;
      d.onclick=()=>loadProject(i); list.appendChild(d);
    });
  }
  function addCurrentToProject(){
    const name=prompt('Project name:')||('Chat '+new Date().toLocaleDateString());
    projects.push({name,date:new Date().toLocaleDateString(),messages:chat.querySelectorAll('.message').length,history:[...history]});
    localStorage.setItem('zts_projects',JSON.stringify(projects));
    renderProjects(); appendMsg('jarvis','Project "'+name+'" saved, sir.');
  }
  function loadProject(i){
    const p=projects[i]; history.length=0; p.history.forEach(h=>history.push(h));
    document.getElementById('project-panel').classList.remove('open');
    appendMsg('jarvis','Project "'+p.name+'" loaded, sir.');
  }

  inputEl.addEventListener('keydown',e=>{if(e.key==='Enter')sendMessage();});
  inputEl.focus();
</script>
</body>
</html>
